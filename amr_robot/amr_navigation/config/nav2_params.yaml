# ============================================================
# PARAMÈTRES NAV2 COMPLETS POUR AMR-Y — VERSION AMÉLIORÉE
# ============================================================

# --------------------------------------------------------
# AMCL — Adaptive Monte Carlo Localization
# --------------------------------------------------------
amcl:
  ros__parameters:

    use_sim_time: true

    # Filtre à particules — augmenté pour meilleure localisation
    min_particles: 500
    max_particles: 2000

    # Modèle de mouvement
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # Paramètres du modèle de mouvement — réduits pour plus de précision
    alpha1: 0.1
    # Réduction de 0.2 à 0.1 — moins de bruit rotation→rotation
    alpha2: 0.1
    # Réduction de 0.2 à 0.1 — moins de bruit translation→rotation
    alpha3: 0.1
    # Réduction de 0.2 à 0.1 — moins de bruit translation→translation
    alpha4: 0.1
    # Réduction de 0.2 à 0.1 — moins de bruit rotation→translation

    # Modèle du capteur laser
    laser_model_type: "likelihood_field"
    laser_max_range: 10.0
    laser_min_range: -1.0
    max_beams: 60

    # Seuils de mise à jour — réduits pour mise à jour plus fréquente
    update_min_d: 0.1
    # Réduction de 0.25 à 0.1 — mise à jour tous les 10cm
    update_min_a: 0.1
    # Réduction de 0.2 à 0.1 — mise à jour tous les 5.7°

    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.001
    # Activation de la récupération lente — aide si AMCL est perdu
    recovery_alpha_fast: 0.1
    # Activation de la récupération rapide

    # Frames TF2
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: scan

    # Position initiale du robot sur la carte
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

# --------------------------------------------------------
# BT NAVIGATOR
# --------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"

# --------------------------------------------------------
# PLANNER SERVER
# --------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      # Changement de false à true — A* plus rapide que Dijkstra
      allow_unknown: true

# --------------------------------------------------------
# CONTROLLER SERVER
# --------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5
    # Augmentation de 0.3 à 0.5 — plus tolérant aux échecs

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      # Réduction de 0.5 à 0.3 — moins strict sur la progression
      movement_time_allowance: 20.0
      # Augmentation de 10 à 20 — plus de temps alloué au robot

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      # Augmentation de 0.25 à 0.5 — plus tolérant sur la position
      yaw_goal_tolerance: 0.5
      # Augmentation de 0.25 à 0.5 — plus tolérant sur l'orientation
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.2
      # Réduction de 0.3 à 0.2 — robot plus lent = plus précis

      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5

      rotate_to_heading_angular_vel: 1.0
      # Réduction de 1.8 à 1.0 — rotation plus lente = plus précise

      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 2.0
      # Réduction de 3.2 à 2.0 — accélération angulaire plus douce
      max_robot_pose_search_dist: 10.0

# --------------------------------------------------------
# COSTMAP GLOBAL
# --------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0

      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: true

# --------------------------------------------------------
# COSTMAP LOCAL
# --------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 4
      # Augmentation de 3 à 4 — fenêtre locale plus grande
      height: 4
      # Augmentation de 3 à 4 — fenêtre locale plus grande
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: true

# --------------------------------------------------------
# MAP SERVER
# --------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

# --------------------------------------------------------
# MAP SAVER
# --------------------------------------------------------
map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# --------------------------------------------------------
# RECOVERIES SERVER — comportements de récupération améliorés
# --------------------------------------------------------
recoveries_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    # Réduction de 1.0 à 0.8 — rotation récupération plus douce
    min_rotational_vel: 0.3
    # Réduction de 0.4 à 0.3 — vitesse minimum plus faible
    rotational_acc_lim: 2.0
    # Réduction de 3.2 à 2.0 — accélération plus douce

# --------------------------------------------------------
# LIFECYCLE MANAGER
# --------------------------------------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - "map_server"
      - "amcl"
      - "planner_server"
      - "controller_server"
      - "recoveries_server"
      - "bt_navigator"